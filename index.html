<!DOCTYPE html>
<html>
<head>
  <title>Endereço mais próximo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }

    h1 {
      font-size: 24px;
      color: #333;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .botao-rota {
      font-size: 20px;
      padding: 14px 24px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .botao-rota:hover {
      background-color: #218838;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>🔎 Buscando endereço da casa de amor mais próxima de você...</h1>

  <script>
    const locais = [
      { nome: "Casa de amor Kirios e Sinchá", endereco: "Rua Diva da silva Rolim, 123", lat: -24.5274, lon: -49.9369 },
      { nome: "Casa de amor Ebenezer", endereco: "Rua Pref. José Torres Neto, 123", lat: -24.5403, lon: -49.9401}
    ];

    function distancia(lat1, lon1, lat2, lon2) {
      return Math.sqrt(
        Math.pow(lat1 - lat2, 2) +
        Math.pow(lon1 - lon2, 2)
      );
    }
navigator.geolocation.getCurrentPosition(pos => {
  const userLat = pos.coords.latitude;
  const userLon = pos.coords.longitude;

  // Adiciona distância em cada local
  locais.forEach(local => {
    local.dist = distancia(userLat, userLon, local.lat, local.lon);
  });

  // Ordena do mais próximo para o mais longe
  locais.sort((a, b) => a.dist - b.dist);

  // Cria HTML de todos os endereços
  let listaHTML = "";

  locais.forEach(local => {
    listaHTML += `
      <div class="card">
        <h2>${local.nome}</h2>
        <p>${local.endereco}</p>
        <button onclick="abrirMapa(${local.lat}, ${local.lon})" class="botao-rota">
          🚗 Abrir rota
        </button>
      </div>
    `;
  });

  document.body.innerHTML = `
    <h1>📍 Casas de amor mais próximas de você:</h1>
    ${listaHTML}
  `;

  window.abrirMapa = function(lat, lon) {
    window.open(`https://www.google.com/maps?q=${lat},${lon}`);
  }
});
  </script>

</body>
</html>
